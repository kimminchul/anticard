<!doctype html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>anti-card · playground</title>
    <link
      rel="stylesheet"
      crossorigin="anonymous"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <script>
      // Theme 초기화 — FOUC 방지 (React mount 전에 적용)
      (function () {
        var t = localStorage.getItem("anti-card-theme") || "dark";
        if (t === "light") document.documentElement.classList.remove("dark");
      })();
    </script>
  </head>
  <body class="bg-white text-zinc-900 antialiased dark:bg-zinc-950 dark:text-zinc-100" style="font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
